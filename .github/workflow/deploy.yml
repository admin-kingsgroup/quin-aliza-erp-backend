name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/apps/backend
            git pull origin main
            npm install --production
            pm2 restart backend
            pm2 save